name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

  # ─── Backend ────────────────────────────────────────────────
  backend:
    name: Backend — PHPUnit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vanclinic
          POSTGRES_USER: vanclinic
          POSTGRES_PASSWORD: vanclinic_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_SECRET: ${{ secrets.APP_SECRET || 'ci_test_secret_32chars_minimum!!' }}
      DATABASE_URL: postgresql://vanclinic:vanclinic_secret@127.0.0.1:5432/vanclinic?serverVersion=16&charset=utf8
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'ci_jwt_passphrase' }}
      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      CORS_ALLOW_ORIGIN: '^https?://localhost'
      MAILER_DSN: 'null://null'

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, intl, mbstring, sodium
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:$JWT_PASSPHRASE
          openssl pkey -in config/jwt/private.pem -out config/jwt/public.pem -pubout -passin pass:$JWT_PASSPHRASE

      - name: Create test database
        run: php bin/console doctrine:database:create --if-not-exists

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Run tests
        run: php vendor/bin/phpunit --testdox
