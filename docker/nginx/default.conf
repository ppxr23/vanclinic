server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # CORS pour permettre au front React de communiquer avec l'API
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin' always;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        internal;
    }

    # Bloquer l'accès direct aux autres fichiers PHP pour la sécurité
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/vanclinic_error.log;
    access_log /var/log/nginx/vanclinic_access.log;

    client_max_body_size 20M;
}
